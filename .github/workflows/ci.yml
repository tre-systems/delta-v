name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      # Local D1 SQLite used by `wrangler dev` (e2e) has no schema until migrations run.
      - name: Apply D1 migrations (local, for wrangler dev + e2e)
        run: npx wrangler d1 migrations apply delta-v-telemetry --local

      - name: Lint
        run: npm run lint

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck (app + tooling)
        run: npm run typecheck:all

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build client
        run: npm run build

      - name: Browser smoke tests
        run: npm run test:e2e:smoke

      - name: Playwright accessibility tests
        run: npm run test:e2e:a11y

      - name: Run Headless Engine Simulations
        # Aligned with pre-commit (60) so local and CI see the same
        # balance variance; keep both in sync when changing. See
        # docs/SIMULATION_TESTING.md.
        run: npm run simulate all 60 -- --ci

      - name: Validate production deploy config
        run: npx wrangler deploy --dry-run

      - name: Apply D1 migrations
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply delta-v-telemetry --remote

      - name: Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
