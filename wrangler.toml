name = "delta-v"
main = "src/server/index.ts"
compatibility_date = "2025-03-01"
routes = [
  { pattern = "delta-v.tre.systems", custom_domain = true }
]

[build]
command = "node esbuild.client.mjs"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"

[durable_objects]
bindings = [{ name = "GAME", class_name = "GameDO" }]

[[d1_databases]]
binding = "DB"
database_name = "delta-v-telemetry"
database_id = "placeholder-create-via-wrangler-d1-create"
migrations_dir = "migrations"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[[migrations]]
tag = "v1"
new_classes = ["GameDO"]
