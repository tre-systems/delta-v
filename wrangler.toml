name = "delta-v"
main = "src/server/index.ts"
compatibility_date = "2025-03-01"
routes = [
  { pattern = "delta-v.tre.systems", custom_domain = true }
]

[build]
command = "node esbuild.client.mjs"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"

[durable_objects]
bindings = [{ name = "GAME", class_name = "GameDO" }]

[[d1_databases]]
binding = "DB"
database_name = "delta-v-telemetry"
database_id = "4339886a-2344-4b8a-b8bc-26aa22da79b6"
migrations_dir = "migrations"

# --- Rate limiting (optional, recommended for production) ---
# Uncomment to enable edge-global rate limiting on /create.
# Without this, the worker falls back to a per-isolate
# in-memory limiter (5 req/IP/min). See docs/SECURITY.md.
#
# [[unsafe.bindings]]
# name = "CREATE_RATE_LIMITER"
# type = "ratelimit"
# namespace_id = "1001"
# simple = { period = 60, limit = 5 }

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[[migrations]]
tag = "v1"
new_classes = ["GameDO"]
