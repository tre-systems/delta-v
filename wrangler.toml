name = "delta-v"
main = "src/server/index.ts"
compatibility_date = "2025-03-01"
routes = [
  { pattern = "delta-v.tre.systems", custom_domain = true }
]

[build]
command = "node esbuild.client.mjs"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"

[durable_objects]
bindings = [
  { name = "GAME", class_name = "GameDO" },
  { name = "MATCHMAKER", class_name = "MatchmakerDO" },
  { name = "LIVE_REGISTRY", class_name = "LiveRegistryDO" }
]

[[d1_databases]]
binding = "DB"
database_name = "delta-v-telemetry"
database_id = "4339886a-2344-4b8a-b8bc-26aa22da79b6"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MATCH_ARCHIVE"
bucket_name = "delta-v-match-archive"

[[ratelimits]]
name = "CREATE_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[ratelimits]]
name = "TELEMETRY_RATE_LIMITER"
namespace_id = "1002"
simple = { limit = 120, period = 60 }

[[ratelimits]]
name = "ERROR_RATE_LIMITER"
namespace_id = "1003"
simple = { limit = 40, period = 60 }

[[ratelimits]]
name = "MCP_RATE_LIMITER"
namespace_id = "1004"
simple = { limit = 20, period = 60 }

[triggers]
# Daily retention purge for `events` rows older than 30 days. See
# src/server/reporting.ts purgeOldEvents and docs/OBSERVABILITY.md.
crons = ["0 4 * * *"]

[vars]
# DEV_MODE=1 lets resolveAgentTokenSecret fall back to a deterministic
# placeholder when AGENT_TOKEN_SECRET is unset. `wrangler dev` (and
# tests) pick up [vars] automatically; production deploys override with
# `wrangler secret put AGENT_TOKEN_SECRET` and do NOT override DEV_MODE,
# so the placeholder path never engages in prod.
DEV_MODE = "1"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[[migrations]]
tag = "v1"
new_classes = ["GameDO"]

[[migrations]]
tag = "v2"
new_classes = ["MatchmakerDO"]

[[migrations]]
tag = "v3"
new_classes = ["LiveRegistryDO"]
