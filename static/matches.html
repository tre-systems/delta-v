<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c1220">
  <meta name="description" content="Browse Delta-V match history and replays from real-time multiplayer tactical space combat.">
  <meta property="og:title" content="Delta-V Matches">
  <meta property="og:description" content="Browse Delta-V match history and replays from real-time multiplayer tactical space combat.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://delta-v.tre.systems/matches">
  <meta property="og:image" content="https://delta-v.tre.systems/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Delta-V tactical space combat with ships plotting vector burns around a planet.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Delta-V Matches">
  <meta name="twitter:description" content="Browse Delta-V match history and replays from real-time multiplayer tactical space combat.">
  <meta name="twitter:image" content="https://delta-v.tre.systems/og-card.png">
  <title>Matches — Delta-V</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    @font-face {
      font-family: 'Space Grotesk';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/fonts/space-grotesk-latin.woff2') format('woff2');
    }

    @font-face {
      font-family: 'Space Grotesk';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('/fonts/space-grotesk-latin.woff2') format('woff2');
    }

    @font-face {
      font-family: 'Space Grotesk';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('/fonts/space-grotesk-latin.woff2') format('woff2');
    }

    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/fonts/ibm-plex-mono-latin-400.woff2') format('woff2');
    }

    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('/fonts/ibm-plex-mono-latin-500.woff2') format('woff2');
    }

    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('/fonts/ibm-plex-mono-latin-600.woff2') format('woff2');
    }

    :root {
      --bg: #040b16;
      --panel: rgba(9, 18, 34, 0.72);
      --panel-strong: rgba(7, 14, 28, 0.88);
      --border: rgba(142, 176, 235, 0.16);
      --border-strong: rgba(122, 215, 255, 0.38);
      --text: #eef4ff;
      --muted: #90a0ba;
      --muted-strong: #b4c0d7;
      --accent: #7ad7ff;
      --accent-soft: rgba(122, 215, 255, 0.14);
      --success: #95d687;
      --warning: #ffc56a;
      --danger: #ff8a8a;
      --radius: 14px;
      --radius-sm: 8px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      font-family: var(--font-display);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-header {
      background: rgba(4, 9, 18, 0.92);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(16px);
    }

    .header-logo { height: 28px; width: 28px; opacity: 0.9; }

    .header-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .header-home {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: inherit;
      border-radius: 4px;
      padding: 2px 4px;
      margin: -2px -4px;
      transition: opacity 0.12s;
    }
    .header-home:hover,
    .header-home:focus-visible {
      opacity: 0.85;
      outline: none;
    }

    .header-sep { color: var(--muted); font-size: 0.85rem; }

    .header-page { font-size: 0.95rem; color: var(--muted-strong); }

    .header-back {
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      transition: border-color 0.15s, color 0.15s;
    }

    .header-back:hover {
      color: var(--accent);
      border-color: var(--border-strong);
      text-decoration: none;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .hero {
      margin-bottom: 2.5rem;
    }

    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    .hero-lead {
      font-size: 1.05rem;
      color: var(--muted-strong);
      max-width: 640px;
      line-height: 1.7;
    }

    .match-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .match-table thead {
      background: var(--panel-strong);
    }

    .match-table th {
      padding: 0.85rem 1rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .match-table td {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .match-table tr:last-child td {
      border-bottom: none;
    }

    .match-table tbody tr {
      transition: background 0.1s;
    }

    .match-table tbody tr:hover {
      background: var(--accent-soft);
    }

    .scenario-name {
      font-weight: 600;
      color: var(--text);
    }

    .outcome-winner {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: var(--radius-sm);
    }

    .outcome-p1 { color: var(--accent); border: 1px solid var(--border-strong); }
    .outcome-p2 { color: var(--warning); border: 1px solid rgba(255, 197, 106, 0.4); }
    .outcome-draw { color: var(--muted); border: 1px solid var(--border); }

    .outcome-named {
      color: var(--accent);
      border: 1px solid var(--border-strong);
      font-family: var(--font-display);
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .loser-suffix {
      color: var(--muted);
      font-size: 0.8rem;
      margin-left: 0.35rem;
    }

    .win-reason {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 0.2rem;
    }

    .turns-cell {
      font-family: var(--font-mono);
      color: var(--muted-strong);
    }

    .date-cell {
      font-family: var(--font-mono);
      color: var(--muted);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .coached-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warning);
      background: rgba(255, 197, 106, 0.1);
      border: 1px solid rgba(255, 197, 106, 0.3);
      border-radius: var(--radius-sm);
    }

    .official-bot-badge {
      display: inline-block;
      margin-left: 0.4rem;
      padding: 0.15rem 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(122, 215, 255, 0.1);
      border: 1px solid rgba(122, 215, 255, 0.28);
      border-radius: var(--radius-sm);
      vertical-align: middle;
    }

    .game-id {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .replay-link {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .replay-actions {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      white-space: nowrap;
    }

    .replay-copy-btn {
      padding: 0.25rem 0.5rem;
      border: 1px solid rgba(122, 215, 255, 0.28);
      border-radius: var(--radius-sm);
      background: rgba(122, 215, 255, 0.08);
      color: var(--accent);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .replay-copy-btn:hover,
    .replay-copy-btn:focus-visible {
      border-color: var(--border-strong);
      background: rgba(122, 215, 255, 0.14);
    }

    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.9rem;
    }

    .load-more {
      display: block;
      margin: 1.5rem auto 0;
      padding: 0.6rem 1.5rem;
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--accent);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .load-more:hover {
      background: var(--accent-soft);
    }

    .load-more:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Live matches section */
    .live-section {
      margin-bottom: 2.5rem;
    }

    .live-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--success);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .live-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .live-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      min-width: 200px;
      flex: 0 1 280px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .live-card-scenario {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
    }

    .live-card-elapsed {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    .live-card-watch {
      display: inline-block;
      margin-top: 0.25rem;
      padding: 0.3rem 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--success);
      border: 1px solid rgba(149, 214, 135, 0.4);
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      align-self: flex-start;
    }

    .live-card-watch:hover {
      background: rgba(149, 214, 135, 0.12);
      color: var(--text);
      text-decoration: none;
    }

    .hidden { display: none !important; }

    @media (max-width: 640px) {
      .page-header { padding: 0.75rem 1.25rem; }
      .container { padding: 2rem 1rem 4rem; }
      .match-table { font-size: 0.8rem; }
      .match-table th, .match-table td { padding: 0.6rem 0.6rem; }
      .date-cell { font-size: 0.7rem; }
      .match-table .hide-mobile { display: none; }
    }
  </style>
</head>
<body>

<header class="page-header">
  <a href="/" class="header-home" aria-label="Delta-V home">
    <img src="/favicon.svg" alt="" class="header-logo" aria-hidden="true">
    <span class="header-title">Delta-V</span>
  </a>
  <span class="header-sep">/</span>
  <span class="header-page">Matches</span>
  <a href="/" class="header-back">← Play</a>
</header>

<main class="container">

  <div class="hero">
    <div class="hero-eyebrow">Match history</div>
    <h1>Recent matches</h1>
    <p class="hero-lead">
      Every completed match is archived. Click any replay to watch it unfold turn-by-turn.
    </p>
  </div>

  <section id="liveSection" class="live-section hidden">
    <div class="live-eyebrow"><span class="live-dot"></span> Live now</div>
    <div id="liveGrid" class="live-grid"></div>
  </section>

  <div id="loading" class="status">Loading matches…</div>
  <div id="error" class="status hidden">
    Couldn't load matches. <a href="/matches">Retry</a>
  </div>
  <div id="empty" class="status hidden">
    No matches yet. <a href="/">Play the first one →</a>
  </div>

  <table id="matches" class="match-table hidden" aria-label="Recent matches">
    <thead>
      <tr>
        <th>Scenario</th>
        <th>Winner</th>
        <th>Turns</th>
        <th class="hide-mobile">Played</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="matches-body"></tbody>
  </table>

  <button id="loadMore" class="load-more hidden" type="button">Load more</button>

</main>

<script>
(() => {
  // Static map of scenario keys → friendly names. Kept in sync with
  // src/shared/scenario-definitions.ts. If a new scenario ships, the row
  // still renders — it just falls back to showing the key.
  const SCENARIO_NAMES = {
    duel: 'Duel',
    biplanetary: 'Bi-Planetary',
    escape: 'Escape',
    lunarEvacuation: 'Lunar Evacuation',
    convoy: 'Convoy',
    blockadeRunner: 'Blockade Runner',
    interplanetaryWar: 'Interplanetary War',
    fleetAction: 'Fleet Action',
    grandTour: 'Grand Tour',
  };

  const $loading = document.getElementById('loading');
  const $error = document.getElementById('error');
  const $empty = document.getElementById('empty');
  const $table = document.getElementById('matches');
  const $body = document.getElementById('matches-body');
  const $loadMore = document.getElementById('loadMore');
  let trackedView = false;

  const track = (event, props = {}) => {
    fetch('/telemetry', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event, ...props }),
      keepalive: true,
    }).catch(() => {});
  };

  let nextBefore = null;
  let loading = false;

  const formatDate = (ms) => {
    const d = new Date(ms);
    const now = Date.now();
    const diff = now - ms;
    const oneDay = 86400000;

    if (diff < oneDay) {
      return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }
    if (diff < 7 * oneDay) {
      return d.toLocaleDateString([], { weekday: 'short', hour: 'numeric', minute: '2-digit' });
    }
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
  };

  const escapeHtml = (s) => {
    const el = document.createElement('div');
    el.textContent = s;
    return el.innerHTML;
  };

  const renderRow = (match) => {
    const scenarioName = SCENARIO_NAMES[match.scenario] || match.scenario;

    let winnerCell;
    if (match.winnerUsername) {
      const loserSuffix = match.loserUsername
        ? `<span class="loser-suffix">vs ${escapeHtml(match.loserUsername)}</span>`
        : '';
      winnerCell =
        `<span class="outcome-winner outcome-named">${escapeHtml(match.winnerUsername)}</span>` +
        loserSuffix;
    } else if (match.winner === 0) {
      winnerCell = '<span class="outcome-winner outcome-p1">Player 1</span>';
    } else if (match.winner === 1) {
      winnerCell = '<span class="outcome-winner outcome-p2">Player 2</span>';
    } else {
      winnerCell = '<span class="outcome-winner outcome-draw">Draw</span>';
    }

    const winReason = match.winReason
      ? `<span class="win-reason">${escapeHtml(match.winReason)}</span>`
      : '';

    const coachedBadge = match.coached
      ? ' <span class="coached-badge" title="This match used the /coach whisper">Coached</span>'
      : '';
    const officialBotBadge = match.officialBotMatch
      ? ' <span class="official-bot-badge" title="This match was played against the platform-operated Official Bot">Official Bot</span>'
      : '';

    const replayUrl = `/?code=${encodeURIComponent(match.roomCode)}&archivedReplay=${encodeURIComponent(match.gameId)}`;
    const absoluteReplayUrl = new URL(replayUrl, window.location.origin).toString();

    return `
      <tr>
        <td>
          <span class="scenario-name">${escapeHtml(scenarioName)}</span>
        </td>
        <td>${winnerCell}${coachedBadge}${officialBotBadge}${winReason}</td>
        <td class="turns-cell">${match.turns}</td>
        <td class="date-cell hide-mobile" title="${new Date(match.completedAt).toISOString()}">${formatDate(match.completedAt)}</td>
        <td>
          <span class="replay-actions">
            <a class="replay-link" href="${replayUrl}" title="Watch ${escapeHtml(match.gameId)}">Replay →</a>
            <button type="button" class="replay-copy-btn" data-replay-url="${escapeHtml(absoluteReplayUrl)}" aria-label="Copy replay link for ${escapeHtml(match.gameId)}">Copy</button>
          </span>
        </td>
      </tr>
    `;
  };

  const fetchPage = async (before) => {
    const params = new URLSearchParams();
    params.set('limit', '50');
    if (before) params.set('before', String(before));
    const res = await fetch(`/api/matches?${params.toString()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  };

  const showError = () => {
    $loading.classList.add('hidden');
    $error.classList.remove('hidden');
  };

  const showEmpty = () => {
    $loading.classList.add('hidden');
    $empty.classList.remove('hidden');
  };

  const append = (matches) => {
    const html = matches.map(renderRow).join('');
    $body.insertAdjacentHTML('beforeend', html);
  };

  const loadMore = async () => {
    if (loading) return;
    loading = true;
    $loadMore.disabled = true;
    try {
      const data = await fetchPage(nextBefore);
      append(data.matches);
      nextBefore = data.nextBefore;
      if (!nextBefore) {
        $loadMore.classList.add('hidden');
      }
    } catch (err) {
      console.error('[matches] load more failed', err);
    } finally {
      loading = false;
      $loadMore.disabled = false;
    }
  };

  const initialLoad = async () => {
    try {
      const data = await fetchPage(null);
      if (data.matches.length === 0) {
        showEmpty();
        return;
      }
      append(data.matches);
      nextBefore = data.nextBefore;
      $loading.classList.add('hidden');
      $table.classList.remove('hidden');
      if (!trackedView) {
        trackedView = true;
        track('matches_list_viewed', {
          entries: data.matches.length,
          hasMore: Boolean(data.nextBefore),
        });
      }
      if (nextBefore) {
        $loadMore.classList.remove('hidden');
      }
    } catch (err) {
      console.error('[matches] initial load failed', err);
      showError();
    }
  };

  // --- Live matches ---
  const $liveSection = document.getElementById('liveSection');
  const $liveGrid = document.getElementById('liveGrid');

  const formatElapsed = (startedAt) => {
    const seconds = Math.floor((Date.now() - startedAt) / 1000);
    if (seconds < 60) return 'Just started';
    const mins = Math.floor(seconds / 60);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    return `${hrs}h ${mins % 60}m ago`;
  };

  const renderLiveCard = (match) => {
    const scenarioName = SCENARIO_NAMES[match.scenario] || match.scenario;
    const spectateUrl = `/?code=${encodeURIComponent(match.code)}&viewer=spectator`;
    return `
      <div class="live-card">
        <span class="live-card-scenario">${escapeHtml(scenarioName)}</span>
        <span class="live-card-elapsed">Started ${formatElapsed(match.startedAt)}</span>
        <a class="live-card-watch" href="${spectateUrl}">Watch live →</a>
      </div>
    `;
  };

  const fetchLive = async () => {
    try {
      const res = await fetch('/api/matches?status=live');
      if (!res.ok) return [];
      const data = await res.json();
      return data.matches || [];
    } catch {
      return [];
    }
  };

  const updateLiveSection = (matches) => {
    if (matches.length === 0) {
      $liveSection.classList.add('hidden');
      return;
    }
    $liveGrid.innerHTML = matches.map(renderLiveCard).join('');
    $liveSection.classList.remove('hidden');
  };

  const pollLive = async () => {
    const matches = await fetchLive();
    updateLiveSection(matches);
  };

  $loadMore.addEventListener('click', loadMore);

  $tbody.addEventListener('click', async (event) => {
    const button = event.target.closest('.replay-copy-btn');
    if (!button) return;
    const replayUrl = button.dataset.replayUrl;
    if (!replayUrl || !navigator.clipboard) return;

    try {
      await navigator.clipboard.writeText(replayUrl);
      button.textContent = 'Copied';
      window.setTimeout(() => {
        button.textContent = 'Copy';
      }, 1800);
    } catch {
      button.textContent = 'Failed';
      window.setTimeout(() => {
        button.textContent = 'Copy';
      }, 1800);
    }
  });

  // Load completed matches and live matches in parallel on page load.
  Promise.all([initialLoad(), pollLive()]);

  // Poll live matches every 15 seconds.
  setInterval(pollLive, 15_000);
})();
</script>
