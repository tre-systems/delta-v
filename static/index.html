<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Delta-V</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Menu screen -->
  <div id="menu" class="screen">
    <div class="menu-content">
      <h1 class="title">DELTA-V</h1>
      <p class="subtitle">Triplanetary</p>
      <button id="createBtn" class="btn btn-primary">Create Game</button>
      <div class="divider">or</div>
      <div class="join-row">
        <input id="codeInput" class="code-input" maxlength="5" placeholder="CODE" autocapitalize="characters" spellcheck="false">
        <button id="joinBtn" class="btn btn-secondary">Join</button>
      </div>
    </div>
  </div>

  <!-- Scenario selection -->
  <div id="scenarioSelect" class="screen" style="display:none">
    <div class="menu-content">
      <h2 class="scenario-title">Select Scenario</h2>
      <button class="btn btn-scenario" data-scenario="biplanetary">
        <div class="scenario-name">Bi-Planetary</div>
        <div class="scenario-desc">1v1 corvettes race to land on the opponent's world</div>
      </button>
      <button class="btn btn-scenario" data-scenario="escape">
        <div class="scenario-name">Escape</div>
        <div class="scenario-desc">3 pilgrim transports flee — enforcers must stop them</div>
      </button>
      <button id="backBtn" class="btn btn-secondary" style="margin-top: 1rem">Back</button>
    </div>
  </div>

  <!-- Waiting for opponent -->
  <div id="waiting" class="screen" style="display:none">
    <div class="menu-content">
      <h2>Game Created</h2>
      <div id="gameCode" class="game-code">-----</div>
      <button id="copyBtn" class="btn btn-secondary">Copy Link</button>
      <p id="waitingStatus" class="status-text">Waiting for opponent...</p>
    </div>
  </div>

  <!-- Game HUD -->
  <div id="hud" style="display:none">
    <div id="topBar" class="hud-bar">
      <span id="turnInfo">Turn 1</span>
      <span id="phaseInfo">ASTROGATION</span>
      <span id="fuelGauge">Fuel: 20/20</span>
    </div>
    <div id="bottomBar" class="hud-bottom">
      <button id="confirmBtn" class="btn btn-confirm" style="display:none">CONFIRM</button>
      <button id="launchMineBtn" class="btn btn-ordnance" style="display:none">MINE</button>
      <button id="launchTorpedoBtn" class="btn btn-ordnance" style="display:none">TORPEDO</button>
      <button id="launchNukeBtn" class="btn btn-ordnance btn-nuke" style="display:none">NUKE</button>
      <button id="skipOrdnanceBtn" class="btn btn-confirm" style="display:none">SKIP</button>
      <button id="attackBtn" class="btn btn-attack" style="display:none">ATTACK</button>
      <button id="skipCombatBtn" class="btn btn-confirm" style="display:none">SKIP COMBAT</button>
      <div id="statusMsg" class="status-msg"></div>
    </div>
  </div>

  <!-- Ship list panel -->
  <div id="shipList" class="ship-list" style="display:none"></div>

  <!-- Game Over overlay -->
  <div id="gameOver" class="screen" style="display:none">
    <div class="menu-content">
      <h2 id="gameOverText">VICTORY</h2>
      <p id="gameOverReason"></p>
      <button id="rematchBtn" class="btn btn-primary">Rematch</button>
      <button id="exitBtn" class="btn btn-secondary">Exit</button>
    </div>
  </div>

  <script type="module" src="/client.js"></script>
</body>
</html>
